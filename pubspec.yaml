name: qoima
description: Мобильное приложение для учёта склада обуви.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Supabase (backend) ─────────────────────────────────────────────────────
  supabase_flutter: ^2.8.0

  # ── Firebase (тек FCM push — backend Supabase күйінде қалады) ──────────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # ── Жергілікті хабарлама (себет еске салуы — серверсіз, тек құрылғыда) ──────
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  http: ^1.2.1
  crypto: ^3.0.7 # Cloudinary signed destroy (суретті жою) үшін SHA-1
  image_picker: ^1.1.2
  image: ^4.3.0
  file_picker: ^8.1.4
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4 # тауар сілтемесін бөлісу (WhatsApp/Telegram/копия)
  qr_flutter: ^4.1.0
  shimmer: ^3.0.0
  confetti: ^0.7.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/app_icon.png
    - assets/documents/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#156945"
    theme_color: "#156945"
  # logo.png мөлдір (тек ак сурет-контур); iOS/веб толық ашық (opaque)
  # квадратты талап етеді, сондықтан оларға дайын app_icon.png (лого + біркелкі
  # #156945 фон) қолданылады. Android adaptive icon-да фон/лого БӨЛЕК қабат —
  # OS өзі маска/параллакс жасайды, сол себепті лого мөлдір күйінде беріледі.
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#156945"
  adaptive_icon_foreground: "assets/images/logo.png"
