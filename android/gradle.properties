# Машинада 7.4 ГБ RAM — 8G heap бүкіл жадтан асып, JVM құлайтын. 2G-ге түсірдік
# (Kotlin/Dart даемондарына орын қалуы үшін). workers.max=2 қатар жұмысты шектейді.
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.workers.max=2
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
